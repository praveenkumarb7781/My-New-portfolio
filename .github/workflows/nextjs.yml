# Disabled: use deploy.yml (peaceiris → gh-pages) as the single Pages pipeline.
# Keeping this file inactive avoids competing deploys on every push to main.
name: Deploy Next.js site to Pages (disabled)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "This workflow is disabled; use Deploy to GitHub Pages"
        required: false

permissions:
  contents: read

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: Skipped
        run: echo "Use the Deploy to GitHub Pages workflow (deploy.yml) instead."
